openapi: 3.1.0
info:
  title: SimWar P0/P1 API
  version: 0.1.0
  description: Minimal P0/P1 contract for the teacher-student-settlement loop plus tenant auth governance.
servers:
  - url: http://localhost:3000
paths:
  /api/v1/auth/login:
    post:
      summary: Login and receive a signed session token.
      responses:
        "200":
          description: Auth session
        "401":
          description: Missing, malformed, or invalid authentication credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/auth/logout:
    post:
      summary: Revoke the current signed session.
      responses:
        "200":
          description: Session revoked
  /api/v1/auth/me:
    get:
      summary: Return the current authenticated user and effective permissions.
      responses:
        "200":
          description: Current user
  /api/v1/admin/state:
    get:
      summary: Return tenant, user, RBAC and audit state for an admin cockpit.
      responses:
        "200":
          description: Admin state
  /api/v1/admin/tenants:
    get:
      summary: List tenants visible to the current administrator.
      responses:
        "200":
          description: Tenant list
    post:
      summary: Create a tenant. Requires platform_admin and tenant:create.
      responses:
        "201":
          description: Tenant created
        "403":
          description: Missing tenant:create permission
  /api/v1/admin/tenants/{tenantId}:
    get:
      summary: Read one tenant.
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant detail
  /api/v1/admin/users:
    get:
      summary: List users in the current tenant, or all users for platform_admin.
      responses:
        "200":
          description: User list
    post:
      summary: Create a tenant-scoped user and assign roles.
      responses:
        "201":
          description: User created
        "403":
          description: Role escalation or permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
        "422":
          description: Missing required user credential or invalid role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/admin/users/{userId}:
    patch:
      summary: Update a user profile, status, password or roles with field-level checks.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User updated
        "403":
          description: Tenant boundary, role escalation or protected field violation
  /api/v1/rbac/roles:
    get:
      summary: List RBAC roles and their permission keys.
      responses:
        "200":
          description: Role list
  /api/v1/rbac/permissions:
    get:
      summary: List platform permission keys.
      responses:
        "200":
          description: Permission list
  /api/v1/courses:
    get:
      summary: List courses in the current tenant.
      responses:
        "200":
          description: Course list
    post:
      summary: Create a draft course.
      responses:
        "201":
          description: Course created
  /api/v1/courses/{courseId}/publish:
    post:
      summary: Publish a course after scenario and parameter checks.
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course published
  /api/v1/courses/{courseId}/teams:
    post:
      summary: Create a team for a course.
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Team created
  /api/v1/courses/{courseId}/runs:
    post:
      summary: Create a run and first draft round.
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Run and round created
  /api/v1/runs/{runId}/rounds/{roundNo}/start:
    post:
      summary: Start a draft round.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Round opened
  /api/v1/runs/{runId}/rounds/{roundNo}/decisions:
    post:
      summary: Submit a validated team decision.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/M1DecisionSubmitRequest"
      responses:
        "201":
          description: Decision accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M1DecisionSubmitSuccessEnvelope"
        "403":
          description: Student is not authorized for the requested team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
        "404":
          description: Run, round, or team not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
        "409":
          description: Round is no longer open
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
        "422":
          description: Decision validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/runs/{runId}/rounds/{roundNo}/lock:
    post:
      summary: Lock a round for settlement.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Round locked
  /api/v1/runs/{runId}/rounds/{roundNo}/settle:
    post:
      summary: Teacher command that requests structured-core settlement.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Settlement result
  /api/v1/bff/teacher/runs/{runId}/scenario-package-candidates:
    get:
      operationId: R7_TEACHER_SCENARIO_PACKAGE_CANDIDATES_GET_V1
      summary: List the Teacher-safe ScenarioPackage candidates for a run tenant.
      description: Read-only Teacher BFF projection. It does not assign or activate a ScenarioPackage, mutate a ParameterSet, execute Replay, or settle a round.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Minimal run-scoped ScenarioPackage candidate projection
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - run_id
                  - current_scenario_package_id
                  - candidates
                properties:
                  run_id:
                    type: string
                  current_scenario_package_id:
                    type:
                      - string
                      - "null"
                  candidates:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - scenario_package_id
                        - display_name
                        - version_label
                        - is_current
                      properties:
                        scenario_package_id:
                          type: string
                        display_name:
                          type: string
                        version_label:
                          type: string
                        is_current:
                          type: boolean
        "401":
          description: Authentication required
        "403":
          description: Teacher authority required
        "404":
          description: Run context not found or out of scope
        "503":
          description: Scenario candidate provider capability unavailable
  /api/v1/bff/admin/run-lifecycle-controls:
    get:
      operationId: SYNTHETIC_RUN_LIFECYCLE_CONTROLS_LIST_V1
      summary: List tenant-scoped synthetic JSON pre-settlement lifecycle controls.
      description: Tenant Admin only. Tenant authority comes from the authenticated session, never a client-supplied tenant identifier. This projection contains no formal truth or private Replay payload.
      security:
        - SessionBearer: []
      responses:
        "200":
          description: Authenticated tenant-scoped lifecycle controls
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [code, message, data, request_id]
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyntheticRunLifecycleControl"
        "401":
          description: Authentication required
        "403":
          description: Tenant Admin lifecycle authority required
  /api/v1/bff/admin/courses/{courseId}/runs/{runId}/lifecycle/{operation}:
    post:
      operationId: SYNTHETIC_RUN_LIFECYCLE_OPERATION_POST_V1
      summary: Apply one bounded pre-settlement lifecycle operation.
      description: ABORT freezes evidence and blocks run progress. RESET may only reopen the transient round lock control. CLEANUP writes an evidence-sealed tombstone and deletes zero persisted artifacts in v1. Settled or published runs fail closed.
      security:
        - SessionBearer: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: operation
          in: path
          required: true
          schema:
            type: string
            enum: [abort, reset, cleanup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [confirmation]
              properties:
                confirmation:
                  type: string
                  description: Exact uppercase operation followed by one space and the run ID, for example ABORT run_001.
      responses:
        "200":
          description: Operation completed or returned idempotently
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [code, message, data, request_id]
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: "#/components/schemas/SyntheticRunLifecycleOperationResult"
        "401":
          description: Authentication required
        "403":
          description: Tenant or role boundary denied
        "404":
          description: Run is absent or outside the authenticated tenant/course scope
        "409":
          description: Runtime, lifecycle, settlement, publication, evidence-freeze, or state transition boundary denied
        "422":
          description: Exact operation confirmation is missing or invalid
  /internal/v1/runs/{runId}/rounds/{roundNo}/settle:
    post:
      summary: Internal structured-core-only settlement entrypoint.
      description: Internal service-principal-only operation. It is not a public browser/client API and must not be generated into Teacher, Student, or Admin frontend clients.
      x-simwar-internal: true
      x-simwar-public-client: false
      x-simwar-service-principal-only: true
      security:
        - InternalServiceBearer: []
          ServicePrincipalHeader: []
      parameters:
        - name: X-Service-Principal
          in: header
          required: true
          schema:
            const: service_kernel
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Settlement result
        "403":
          description: Service-principal credential is missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/runs/{runId}/rounds/{roundNo}/publish:
    post:
      summary: Publish a settled round.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Round published
  /api/v1/runs/{runId}/rounds/{roundNo}/results:
    get:
      summary: Read role-trimmed round results.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: roundNo
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public result view
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/M1StudentResultEnvelope"
                  - $ref: "#/components/schemas/M1TeacherAdminResultEnvelope"
        "403":
          description: Actor is not authorized to read this result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
        "404":
          description: Run or round not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/audit/logs:
    get:
      summary: Read tenant-scoped audit logs.
      responses:
        "200":
          description: Audit logs
components:
  securitySchemes:
    SessionBearer:
      type: http
      scheme: bearer
      description: Signed user session. Tenant scope is resolved by the server from this identity.
    InternalServiceBearer:
      type: http
      scheme: bearer
      description: Internal service token only. Public browser clients must not receive or use this credential.
    ServicePrincipalHeader:
      type: apiKey
      in: header
      name: X-Service-Principal
      description: Must identify the service kernel principal for internal settlement.
  schemas:
    SyntheticRunLifecycleControl:
      type: object
      additionalProperties: false
      required:
        - tenant_id
        - course_id
        - run_id
        - runtime_boundary
        - synthetic_marker
        - lifecycle_state
        - pre_settlement
        - pre_publication
        - evidence_frozen
        - allowed_operations
        - blocked_reasons
        - ephemeral_artifact_allowlist
        - preserved_state
        - explicit_non_proofs
        - audit_reference
      properties:
        tenant_id:
          type: string
        course_id:
          type: string
        run_id:
          type: string
        runtime_boundary:
          const: JSON_INTERNAL_ONLY
        synthetic_marker:
          type: boolean
        lifecycle_state:
          type: string
          enum: [ACTIVE, ABORTED, RESET_READY, CLEANED]
        pre_settlement:
          type: boolean
        pre_publication:
          type: boolean
        evidence_frozen:
          type: boolean
        allowed_operations:
          type: array
          items:
            type: string
            enum: [abort, reset, cleanup]
        blocked_reasons:
          type: array
          items:
            type: string
        ephemeral_artifact_allowlist:
          type: array
          items:
            type: string
        preserved_state:
          type: array
          items:
            type: string
        explicit_non_proofs:
          type: array
          items:
            type: string
        audit_reference:
          type:
            - string
            - "null"
    SyntheticRunLifecycleOperationResult:
      type: object
      additionalProperties: false
      required: [operation, idempotent, ephemeral_artifacts_changed, control]
      properties:
        operation:
          type: string
          enum: [abort, reset, cleanup]
        idempotent:
          type: boolean
        ephemeral_artifacts_changed:
          type: array
          items:
            type: string
        control:
          $ref: "#/components/schemas/SyntheticRunLifecycleControl"
    ApiErrorEnvelope:
      $ref: "../schemas/api-error-envelope.v1.json"
    M1DecisionSubmitRequest:
      $ref: "../schemas/m1-decision-submit-request.v1.json"
    M1DecisionSubmitSuccessEnvelope:
      $ref: "../schemas/m1-decision-submit-success-envelope.v1.json"
    M1StudentResultEnvelope:
      $ref: "../schemas/m1-student-result-envelope.v1.json"
    M1TeacherAdminResultEnvelope:
      $ref: "../schemas/m1-teacher-admin-result-envelope.v1.json"
    M1PublicReplayEvidence:
      $ref: "../schemas/m1-public-replay-evidence.v1.json"
