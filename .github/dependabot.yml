version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        patterns:
          - "react"
          - "react-dom"
          - "@vitejs/*"
          - "vite"
      quality-tooling:
        patterns:
          - "@eslint/*"
          - "eslint"
          - "typescript-eslint"
          - "prettier"
          - "knip"
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "jsdom"
          - "globals"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
