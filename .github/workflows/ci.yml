name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: simwar_test
          POSTGRES_PASSWORD: simwar_test
          POSTGRES_DB: simwar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U simwar_test -d simwar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:postgres-replay
        env:
          SIMWAR_TEST_DATABASE_URL: postgresql://simwar_test:simwar_test@localhost:5432/simwar_test
      - run: npm run test:contract
      - run: npm run build
