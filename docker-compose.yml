services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: simwar
      POSTGRES_USER: simwar
      POSTGRES_PASSWORD: simwar
    ports:
      - "5432:5432"
    volumes:
      - simwar-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simwar -d simwar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  simwar-postgres:
